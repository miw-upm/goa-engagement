  text: >-
    {{clientes}}, en su nombre y derecho, encarga profesionalmente a la abogada Nuria Ocaña Pérez con
    número de D.N.I. n.º 46.882.956-D y número de colegiada 135.280 del ICAM con despacho profesional
    sito en el Paseo de la Castellana, 93 – 2ª planta de Madrid la realización de los siguientes
    trabajos profesionales.
responsable:
  text: "Por solicitud de {{solicitante}}, se realiza el siguiente presupuesto:"
servicios:
  title: "Servicios Contratados"
ejecucion_trabajos:
  text: >-
    La ejecución de estos trabajos profesionales se efectuará en régimen de arrendamiento de servicios,
    con arreglo a las normas deontológicas de la Abogacía. En consecuencia, con carácter indicativo y al
    margen de las incidencias que puedan plantearse incluyendo los honorarios de otros profesionales que
    deban intervenir (procurador, peritos, costas de contrario, Notarios, Registros, etc.), no incluirán
    los gastos de desplazamiento o de otra naturaleza, ni suplidos que puedan ocasionarse en la ejecución
    de los trabajos objeto de este encargo.
pagos:
  title: "Formas de Pago"
bancos:
  title: "Datos Bancarios"
combinacion_vias:
  title: "Combinación de vías"
  text: >-
    Existe la posibilidad de que una fase (por ejemplo, la formación de inventario) se tramite de forma
    contenciosa, y la posterior liquidación se realice ante notario de común acuerdo. Por ello, se ha
    optado por desglosar los honorarios por fases y vías, para facilitar la adaptación del presupuesto al
    desarrollo real del procedimiento.
condiciones_generales:
  title: "Condiciones Generales"
  text: |-
    Los honorarios pactados en la presente hoja de encargo profesional incluyen las consultas relacionadas
    con el encargo que tengan lugar durante los dos meses posteriores a la resolución o documento que ponga
    fin al procedimiento. Transcurrido dicho tiempo, las consultas que surjan relacionadas con el encargo y
    la aplicación de la resolución tendrán un coste de 150,00 € + IVA, que será abonado en el momento de
    efectuar la consulta.

    Los honorarios de Letrado objeto de la presente se presupuestan al margen de incidencias y recursos que
    puedan plantearse y sin incluir los honorarios de otros profesionales que puedan o deban intervenir,
    como procuradores o peritos. El pago de las tasas y depósitos judiciales que pudieran existir será de
    cuenta del cliente y no se encuentra incluido en los honorarios descritos.

    Los honorarios pactados únicamente cubrirán las actuaciones realizadas en la Comunidad de Madrid. De
    igual modo, cualquier servicio jurídico que no esté incluido en el presente contrato se realizará previo
    presupuesto y aceptación por ambas partes.

    La minuta de honorarios definitiva estará sujeta al régimen fiscal de retenciones e IVA procedentes que
    serán abonados por el cliente.
nota_solidaridad:
  text: >-
    Nota: de ser varias las personas que realizan el encargo, dicha obligación será asumida con carácter
    solidario por todas ellas.
desavenencias:
  text: >-
    En el caso de que existieran desavenencias con relación al asunto encomendado, cualquiera de las
    partes podrá desistir unilateralmente, previo aviso por escrito a la otra parte, de la continuación en
    la prestación de los servicios por parte de la Letrada, debiéndose liquidar en ese momento las
    cantidades adeudadas por el cliente por los trabajos efectivamente realizados por la Letrada.
advertencias:
  title: "Advertencias"
seguro_rc:
  title: "Seguro de Responsabilidad Civil"
  text: >-
    La Letrada dispone de seguro de responsabilidad civil profesional conforme a la normativa vigente del
    Ilustre Colegio de Abogados de Madrid.
comunicaciones:
  title: "Comunicaciones"
  text: >-
    Las partes acuerdan que las comunicaciones relativas al presente encargo podrán realizarse por correo
    electrónico a las direcciones facilitadas, considerándose válidas a todos los efectos.
proteccion_datos:
  title: "Protección de Datos"
  text: >-
    Los datos personales facilitados serán tratados por Nuria Ocaña Pérez, con NIF 46.882.956-D, con la
    finalidad de gestionar el presente encargo profesional. La base jurídica del tratamiento es la ejecución
    del contrato. Los datos se conservarán durante la relación contractual y posteriormente durante los
    plazos legales aplicables. No se cederán datos a terceros salvo obligación legal o para la ejecución del
    encargo. Puede ejercer sus derechos de acceso, rectificación, supresión, oposición, limitación y
    portabilidad en derecho@ocanabogados.es. Más información en nuestra Política de Privacidad.
jurisdiccion:
  title: "Jurisdicción"
  text: >-
    Las partes se someten expresamente a la legislación española, sometiéndose a la jurisdicción de los
    Juzgados y Tribunales de Madrid.
aviso_presupuesto:
  title: "AVISO"
  text: "La validez del presente presupuesto es de 30 días naturales a contar desde su emisión."
aviso_hoja:
  title: "AVISO IMPORTANTE"
  text: |-
    La validez de la presente hoja de encargo profesional es de 30 días naturales a contar desde su emisión.
    Cualquier modificación sustancial en las actuaciones del procedimiento será tenida en cuenta para una
    valoración de liquidación final, así como la existencia de nuevas actuaciones o procedimientos judiciales
    no contemplados en el presente presupuesto será origen de solicitud por parte del despacho de una nueva
    provisión de fondos.

    En virtud de lo expuesto y en prueba de conformidad, se firma el presente encargo, en las fechas indicadas.
aviso_importante:
  title: "AVISO IMPORTANTE"
